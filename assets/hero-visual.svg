<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300">
  <defs>
    <!-- Gradients -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#060d1a"/>
      <stop offset="100%" stop-color="#0d1e35"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#111"/>
    </linearGradient>
    <linearGradient id="bodyTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d0d8e4"/>
      <stop offset="35%" stop-color="#e8edf4"/>
      <stop offset="65%" stop-color="#b8c4d0"/>
      <stop offset="100%" stop-color="#7a8898"/>
    </linearGradient>
    <linearGradient id="bodyBot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9aa8b8"/>
      <stop offset="100%" stop-color="#6a7888"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2e42" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0a1828" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="hoodDmg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0bcc8"/>
      <stop offset="100%" stop-color="#8898a8"/>
    </linearGradient>
    <radialGradient id="tire" cx="38%" cy="35%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="70%" stop-color="#111"/>
      <stop offset="100%" stop-color="#080808"/>
    </radialGradient>
    <radialGradient id="rim" cx="38%" cy="35%">
      <stop offset="0%" stop-color="#dde4ec"/>
      <stop offset="50%" stop-color="#9aa8b8"/>
      <stop offset="100%" stop-color="#60707e"/>
    </radialGradient>
    <radialGradient id="spotlight" cx="50%" cy="50%">
      <stop offset="0%" stop-color="rgba(255,220,150,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,200,100,0)"/>
    </radialGradient>
    <radialGradient id="headlitglow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="rgba(220,200,100,0.6)"/>
      <stop offset="100%" stop-color="rgba(220,200,100,0)"/>
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <clipPath id="clip">
      <rect width="520" height="300" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#clip)">

  <!-- ── BACKGROUND ── -->
  <rect width="520" height="300" fill="url(#sky)"/>

  <!-- Distant city glow -->
  <ellipse cx="260" cy="175" rx="320" ry="60" fill="rgba(15,35,65,0.5)"/>

  <!-- ── ROAD ── -->
  <rect x="0" y="200" width="520" height="100" fill="url(#road)"/>
  <!-- Road-edge line -->
  <rect x="0" y="198" width="520" height="3" fill="#282828"/>
  <!-- Asphalt texture lines -->
  <line x1="0" y1="215" x2="520" y2="215" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
  <line x1="0" y1="230" x2="520" y2="230" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  <!-- Center dashes -->
  <line x1="0" y1="245" x2="520" y2="245" stroke="rgba(255,255,255,0.07)" stroke-width="2" stroke-dasharray="28,18"/>

  <!-- ── SKID MARKS ── -->
  <path d="M 105,200 Q 155,198 200,200" stroke="rgba(0,0,0,0.9)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 108,200 Q 158,198 203,200" stroke="rgba(10,10,10,0.7)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 115,200 Q 162,199 205,200" stroke="rgba(0,0,0,0.4)" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 280,200 Q 320,199 360,200" stroke="rgba(0,0,0,0.8)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 278,200 Q 318,199 356,200" stroke="rgba(0,0,0,0.5)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- ── SPOTLIGHT from above ── -->
  <ellipse cx="220" cy="175" rx="160" ry="130" fill="url(#spotlight)" filter="url(#blur4)"/>

  <!-- ── CAR SHADOW ── -->
  <ellipse cx="215" cy="202" rx="155" ry="9" fill="rgba(0,0,0,0.65)" filter="url(#blur2)"/>

  <!-- ════════════════════════════
       CAR — REALISTIC SIDE VIEW
  ════════════════════════════ -->

  <!-- REAR BUMPER -->
  <rect x="55" y="182" width="22" height="14" rx="3" fill="#9aa8b6"/>
  <rect x="55" y="182" width="22" height="4" rx="2" fill="#b8c4d0"/>

  <!-- REAR TAIL LIGHTS -->
  <rect x="57" y="160" width="14" height="24" rx="2" fill="#880000"/>
  <rect x="57" y="160" width="14" height="11" rx="2" fill="#cc1111"/>
  <rect x="57" y="171" width="14" height="4" rx="1" fill="#ff2222" opacity="0.7"/>
  <!-- Tail light lens lines -->
  <line x1="57" y1="166" x2="71" y2="166" stroke="rgba(0,0,0,0.3)" stroke-width="0.8"/>
  <line x1="57" y1="171" x2="71" y2="171" stroke="rgba(0,0,0,0.3)" stroke-width="0.8"/>

  <!-- REAR FENDER / BODY REAR -->
  <path d="M 58,160 L 58,145 Q 58,138 65,135 L 100,133 L 105,160 Z" fill="url(#bodyTop)"/>

  <!-- MAIN BODY LOWER SECTION -->
  <rect x="72" y="163" width="265" height="25" rx="3" fill="url(#bodyBot)"/>
  <!-- Lower body trim line -->
  <rect x="72" y="163" width="265" height="3" rx="1" fill="#c8d4e0"/>
  <!-- Bottom sill -->
  <rect x="72" y="184" width="260" height="6" rx="2" fill="#8898a8"/>

  <!-- BODY SIDE PANEL - main large shape -->
  <path d="
    M 72,163
    L 72,145
    Q 72,135 78,133
    L 105,133
    L 108,130
    L 120,115
    L 133,108
    L 200,106
    L 230,108
    L 248,118
    L 260,130
    L 268,133
    L 285,133
    Q 290,133 293,130
    L 298,125
    L 308,122
    Q 335,120 345,128
    L 350,133
    L 355,140
    L 358,150
    L 358,163
    L 338,163
    L 337,188
    L 118,188
    L 117,163
    Z
  " fill="url(#bodyTop)"/>

  <!-- ROOF -->
  <path d="
    M 122,115
    L 135,100
    L 145,93
    L 200,90
    L 230,90
    L 248,95
    L 263,108
    L 248,118
    L 230,108
    L 200,106
    L 133,108
    Z
  " fill="#dce4ee"/>
  <!-- Roof highlight -->
  <path d="
    M 138,97
    L 148,91
    L 200,88
    L 228,88
    L 242,93
    L 240,96
    L 225,92
    L 200,90
    L 145,92
    Z
  " fill="rgba(255,255,255,0.35)"/>

  <!-- WINDSHIELD -->
  <path d="
    M 248,118
    L 263,108
    L 248,95
    L 235,92
    L 232,108
    Z
  " fill="url(#glass)"/>
  <!-- Windshield frame -->
  <path d="M 248,118 L 263,108 L 248,95 L 235,92 L 232,108 Z" fill="none" stroke="#60788a" stroke-width="1.5"/>
  <!-- Windshield reflection -->
  <path d="M 240,95 L 252,100 L 244,114 Z" fill="rgba(255,255,255,0.08)"/>

  <!-- SIDE WINDOWS -->
  <!-- Window 1 (front door) -->
  <path d="
    M 200,107
    L 228,107
    L 240,116
    L 231,130
    L 200,130
    Z
  " fill="url(#glass)"/>
  <!-- Window 2 (rear door) -->
  <path d="
    M 143,107
    L 198,107
    L 198,130
    L 138,130
    L 133,120
    Z
  " fill="url(#glass)"/>
  <!-- Rear quarter window -->
  <path d="
    M 110,132
    L 132,118
    L 140,107
    L 143,107
    L 138,130
    Z
  " fill="url(#glass)" opacity="0.9"/>

  <!-- Window frames/pillars -->
  <line x1="200" y1="106" x2="200" y2="131" stroke="#506070" stroke-width="2.5"/>
  <line x1="141" y1="107" x2="138" y2="131" stroke="#506070" stroke-width="2"/>

  <!-- DOOR LINES -->
  <line x1="200" y1="131" x2="198" y2="188" stroke="#7a8898" stroke-width="1" opacity="0.7"/>
  <line x1="140" y1="130" x2="138" y2="188" stroke="#7a8898" stroke-width="1" opacity="0.5"/>

  <!-- Body character crease line -->
  <path d="M 70,155 Q 150,153 270,152 L 340,155 L 358,158" stroke="#c0ccd8" stroke-width="1.5" fill="none" opacity="0.6"/>

  <!-- DOOR HANDLES -->
  <rect x="220" y="150" width="20" height="5" rx="2" fill="#8898a8"/>
  <rect x="158" y="150" width="20" height="5" rx="2" fill="#8898a8"/>

  <!-- ═══ FRONT DAMAGED HOOD ═══ -->
  <!-- Hood surface base (crumpled) -->
  <path d="
    M 295,130
    L 302,122
    L 315,118
    Q 330,115 342,120
    L 352,128
    L 356,138
    L 358,150
    L 348,145
    L 340,135
    L 330,130
    L 315,126
    L 305,128
    Z
  " fill="url(#hoodDmg)"/>

  <!-- Hood crumple details -->
  <path d="M 305,128 L 318,122 L 328,125" stroke="#8898a8" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 320,120 L 335,117 L 345,122" stroke="#8898a8" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 332,118 L 345,122 L 350,132" stroke="#909eae" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Crumple creases -->
  <line x1="310" y1="128" x2="316" y2="120" stroke="#6a7a8a" stroke-width="1.5" opacity="0.8"/>
  <line x1="322" y1="124" x2="330" y2="116" stroke="#6a7a8a" stroke-width="1.5" opacity="0.7"/>
  <line x1="337" y1="120" x2="342" y2="126" stroke="#6a7a8a" stroke-width="1.2" opacity="0.6"/>
  <!-- Sharp crumple fold -->
  <path d="M 315,128 L 322,118 L 330,122 L 325,130" stroke="#5a6a7a" stroke-width="2" fill="rgba(80,100,120,0.3)" stroke-linejoin="round"/>

  <!-- FRONT BUMPER (damaged) -->
  <path d="M 340,178 Q 352,174 362,178 L 364,190 Q 352,194 340,190 Z" fill="#9aa8b6"/>
  <!-- Bumper crack -->
  <path d="M 348,178 L 352,185 L 357,179" stroke="#5a6878" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M 354,176 L 356,183" stroke="#6a7888" stroke-width="1.5" fill="none"/>
  <!-- Bumper paint scrape -->
  <path d="M 342,184 L 360,181" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>

  <!-- FRONT GRILLE -->
  <rect x="346" y="158" width="18" height="18" rx="2" fill="#141414"/>
  <line x1="350" y1="158" x2="350" y2="176" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="354" y1="158" x2="354" y2="176" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="358" y1="158" x2="358" y2="176" stroke="#2a2a2a" stroke-width="1.5"/>
  <line x1="346" y1="163" x2="364" y2="163" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="346" y1="168" x2="364" y2="168" stroke="#2a2a2a" stroke-width="1.2"/>
  <line x1="346" y1="173" x2="364" y2="173" stroke="#2a2a2a" stroke-width="1.2"/>

  <!-- HEADLIGHT (broken) -->
  <rect x="340" y="148" width="20" height="12" rx="2" fill="#1a1a1a"/>
  <rect x="342" y="150" width="16" height="8" rx="1" fill="#222"/>
  <!-- Broken headlight glow (dim) -->
  <ellipse cx="350" cy="154" rx="10" ry="5" fill="url(#headlitglow)" filter="url(#blur2)"/>
  <!-- Crack lines on headlight -->
  <line x1="342" y1="150" x2="354" y2="158" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
  <line x1="348" y1="148" x2="352" y2="158" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>

  <!-- FRONT FENDER CREASE -->
  <path d="M 300,133 Q 318,128 340,130" stroke="#7a8898" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- ════ WHEELS ════ -->
  <!-- FRONT WHEEL -->
  <!-- Tire -->
  <circle cx="318" cy="200" r="32" fill="url(#tire)"/>
  <!-- Sidewall detail -->
  <circle cx="318" cy="200" r="30" fill="none" stroke="rgba(50,50,50,0.8)" stroke-width="3"/>
  <circle cx="318" cy="200" r="27" fill="none" stroke="rgba(40,40,40,0.4)" stroke-width="1.5" stroke-dasharray="3,5"/>
  <!-- Rim -->
  <circle cx="318" cy="200" r="22" fill="url(#rim)"/>
  <!-- Rim ring -->
  <circle cx="318" cy="200" r="20" fill="none" stroke="#8898a8" stroke-width="1.5"/>
  <!-- Spokes -->
  <g stroke="#b8c4d0" stroke-width="2.5" stroke-linecap="round">
    <line x1="318" y1="180" x2="318" y2="200"/>
    <line x1="330" y1="184" x2="318" y2="200"/>
    <line x1="338" y1="194" x2="318" y2="200"/>
    <line x1="336" y1="208" x2="318" y2="200"/>
    <line x1="326" y1="217" x2="318" y2="200"/>
    <line x1="310" y1="217" x2="318" y2="200"/>
    <line x1="300" y1="208" x2="318" y2="200"/>
    <line x1="298" y1="194" x2="318" y2="200"/>
    <line x1="306" y1="184" x2="318" y2="200"/>
  </g>
  <!-- Hub -->
  <circle cx="318" cy="200" r="8" fill="#4a5868"/>
  <circle cx="318" cy="200" r="5" fill="#6a7888"/>
  <circle cx="318" cy="200" r="2.5" fill="#8898a8"/>

  <!-- REAR WHEEL -->
  <circle cx="112" cy="200" r="32" fill="url(#tire)"/>
  <circle cx="112" cy="200" r="30" fill="none" stroke="rgba(50,50,50,0.8)" stroke-width="3"/>
  <circle cx="112" cy="200" r="27" fill="none" stroke="rgba(40,40,40,0.4)" stroke-width="1.5" stroke-dasharray="3,5"/>
  <circle cx="112" cy="200" r="22" fill="url(#rim)"/>
  <circle cx="112" cy="200" r="20" fill="none" stroke="#8898a8" stroke-width="1.5"/>
  <g stroke="#b8c4d0" stroke-width="2.5" stroke-linecap="round">
    <line x1="112" y1="180" x2="112" y2="200"/>
    <line x1="124" y1="184" x2="112" y2="200"/>
    <line x1="132" y1="194" x2="112" y2="200"/>
    <line x1="130" y1="208" x2="112" y2="200"/>
    <line x1="120" y1="217" x2="112" y2="200"/>
    <line x1="104" y1="217" x2="112" y2="200"/>
    <line x1="94" y1="208" x2="112" y2="200"/>
    <line x1="92" y1="194" x2="112" y2="200"/>
    <line x1="100" y1="184" x2="112" y2="200"/>
  </g>
  <circle cx="112" cy="200" r="8" fill="#4a5868"/>
  <circle cx="112" cy="200" r="5" fill="#6a7888"/>
  <circle cx="112" cy="200" r="2.5" fill="#8898a8"/>

  <!-- ════ FORENSIC SCENE ELEMENTS ════ -->

  <!-- Measurement tape on ground -->
  <rect x="30" y="214" width="460" height="6" rx="1" fill="#f0c000" opacity="0.85"/>
  <!-- Tape markings -->
  <line x1="60" y1="214" x2="60" y2="220" stroke="#c09000" stroke-width="1"/>
  <line x1="90" y1="214" x2="90" y2="220" stroke="#c09000" stroke-width="1"/>
  <line x1="120" y1="214" x2="120" y2="220" stroke="#c09000" stroke-width="1"/>
  <line x1="150" y1="214" x2="150" y2="220" stroke="#c09000" stroke-width="1"/>
  <line x1="180" y1="214" x2="180" y2="220" stroke="#c09000" stroke-width="1"/>
  <line x1="210" y1="214" x2="210" y2="220" stroke="#c09000" stroke-width="1"/>
  <line x1="240" y1="214" x2="240" y2="220" stroke="#c09000" stroke-width="1"/>
  <line x1="270" y1="214" x2="270" y2="220" stroke="#c09000" stroke-width="1"/>
  <line x1="300" y1="214" x2="300" y2="220" stroke="#c09000" stroke-width="1"/>
  <line x1="330" y1="214" x2="330" y2="220" stroke="#c09000" stroke-width="1"/>
  <line x1="360" y1="214" x2="360" y2="220" stroke="#c09000" stroke-width="1"/>
  <line x1="390" y1="214" x2="390" y2="220" stroke="#c09000" stroke-width="1"/>
  <line x1="420" y1="214" x2="420" y2="220" stroke="#c09000" stroke-width="1"/>
  <line x1="450" y1="214" x2="450" y2="220" stroke="#c09000" stroke-width="1"/>

  <!-- EVIDENCE MARKERS -->
  <!-- Marker 1 -->
  <polygon points="36,212 43,199 50,212" fill="#f5c500"/>
  <rect x="37" y="203" width="12" height="8" rx="1" fill="#f5c500"/>
  <text x="43" y="210" font-family="Arial Black,Arial,sans-serif" font-size="7" font-weight="900" fill="#000" text-anchor="middle">1</text>

  <!-- Marker 2 -->
  <polygon points="192,211 199,198 206,211" fill="#f5c500"/>
  <rect x="193" y="202" width="12" height="8" rx="1" fill="#f5c500"/>
  <text x="199" y="209" font-family="Arial Black,Arial,sans-serif" font-size="7" font-weight="900" fill="#000" text-anchor="middle">2</text>

  <!-- Marker 3 -->
  <polygon points="408,211 415,198 422,211" fill="#f5c500"/>
  <rect x="409" y="202" width="12" height="8" rx="1" fill="#f5c500"/>
  <text x="415" y="209" font-family="Arial Black,Arial,sans-serif" font-size="7" font-weight="900" fill="#000" text-anchor="middle">3</text>

  <!-- Paint mark / debris spot on road -->
  <ellipse cx="248" cy="207" rx="8" ry="4" fill="rgba(100,90,70,0.5)"/>
  <circle cx="242" cy="210" rx="3" r="3" fill="rgba(80,70,60,0.4)"/>
  <circle cx="256" cy="205" r="2" fill="rgba(90,80,65,0.3)"/>

  <!-- ── OVERLAY GRADIENT (depth) ── -->
  <rect x="0" y="0" width="80" height="300" fill="rgba(6,13,26,0.5)"/>
  <rect x="440" y="0" width="80" height="300" fill="rgba(6,13,26,0.4)"/>
  <rect x="0" y="0" width="520" height="30" fill="rgba(6,13,26,0.3)"/>

  <!-- ── BOTTOM LABEL ── -->
  <rect x="0" y="272" width="520" height="28" fill="rgba(0,0,0,0.4)"/>
  <text x="18" y="288" font-family="monospace" font-size="9" fill="rgba(245,197,0,0.75)" letter-spacing="2">ADLİ TRAFİK ANALİZİ</text>
  <text x="280" y="288" font-family="monospace" font-size="8" fill="rgba(255,255,255,0.3)" letter-spacing="1">KAZA YERİ · OLAY YERİ İNCELEME</text>

